<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
>
<head>
	<meta charset="UTF-8">
	<title>CAR SAFETY</title>
	<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
	crossorigin="anonymous">
	<link rel="stylesheet" href="css/estilos2.css">
</head>
<body>
	<div class="menu_principal">
		<div class="header">
			<h4>Ingresaste como: Cajera</h4>
			<form method="post" th:action="@{/logout}" >
			<button type="submit" class="cerrar_sesion">Cerrar Sesion</button>
			</form>
		</div>
		
		<div>
			<img src="imagenes/logocar.png" class="logo">
		</div>
		<h1>Menu Principal</h1>
		<div class="menu_botones">
			<div class="submenu_botones">
				<a href="/registrarticket" class="boton" >Registrar Ticket</a>
				<a href="/gestionarticket" class="boton" >Gestionar Ticket</a>
				<button type="submit" class="boton">Anular Ticket</button>
				<button type="submit" class="boton">Listar Tickets</button>
			</div>
			<div class="submenu_botones">
				<a href="/registrarcontrato" class="boton" >Generar Contrato</a>
				<a href="/renovarcontrato" class="boton" >Renovar Contrato</a>
				<button type="submit" class="boton">Listar Contratos</button>
				<button type="submit" class="boton">Listar Ordenes de Pago</button>
			</div>
			<div class="submenu_botones">
				<a href="/registrarcomprobante" class="boton" >Generar Comprobante</a>
				<button type="submit" class="boton">Anular Comprobante</button>
				<a href="/registrarcliente" class="boton" >Registrar Cliente</a>
				<a href="/listarclientes" class="boton" >Listar Cliente</a>
			</div>
			
		</div>
		
		
	</div>
		

</body>
</html>
