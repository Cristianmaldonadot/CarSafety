<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
>
<head>
	<meta charset="UTF-8">
	<title>CAR SAFETY</title>
	<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
	crossorigin="anonymous">
	<link rel="stylesheet" href="css/estilos.css">
</head>
<body>
	<header> </header>
	<section class="modal">
		<div class="modal_container">
			<img src="imagenes/parking.jpg" class="modal_image" alt="">
			<div class="modal_block_sesion">
				<form method="post" th:action="@{/logginprocess}" >
					<img src="imagenes/logocar.png" class="logo" alt="">
					<h4 class="modal_text">INICIAR SESION</h4>
					<br>
					<div class="text-start">
						<label class="p-1 fw-bolder">Usuario</label> 
						<input type="text" name="username" id="username" class="form-control ">
					</div>
					<br>
					<div class="text-start">
						<label class="p-1 fw-bolder">Password</label> 
						<input type="password" name="password" id="password" class="form-control">
					</div>
					<div class="">
						<input type="submit" value="INGRESAR"	class="modal_button">
					</div>
				</form>
			</div>
		</div>
	</section>
	<footer>
	</footer>		
</body>
</html>
